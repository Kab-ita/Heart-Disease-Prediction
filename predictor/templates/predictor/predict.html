{% extends 'predictor/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-8 col-xl-7">
    <div class="text-center mb-4">
      <div class="d-inline-block bg-danger-subtle rounded-circle p-3 mb-2" style="color: #8b0000 !important;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-heart-pulse-fill" viewBox="0 0 16 16">
          <path d="M1.475 9c.085.302.26.543.479.686.255.166.604.251.98.251.702 0 1.486-.347 2.131-.692.413-.22.75-.443.993-.614l.013-.01.003-.002a.016.016 0 0 1 .004-.002l.001-.001h.002L6.14 8.5l1.24 2.48a.5.5 0 0 0 .922-.04l1.5-4.5 1.08 3.24a.5.5 0 0 0 .902.09l1.1-2.2c.29.15.65.3 1.01.4l.011.003.004.001h.001a.34.34 0 0 0 .144.025c.196 0 .393-.072.508-.184l.01-.012.002-.003.001-.001L15 7.666V11.5a2.5 2.5 0 0 1-2.5 2.5h-9A2.5 2.5 0 0 1 1 11.5V9h.475zM14 6.518l-1.314 2.628L11.44 5.31a.5.5 0 0 0-.916-.048L9.04 9.714 7.81 7.254a.5.5 0 0 0-.894.015L5.592 9.92 4.21 10.612c-.29.145-.638.258-.945.258-.266 0-.462-.053-.561-.117-.118-.077-.193-.207-.223-.393L1.22 6.518c.118-.077.193-.207.223-.393l.835-2.923c.03-.105.122-.178.223-.202l3.41-.8c.102-.024.21.016.27.1l1.83 2.56 1.15-2.01c.06-.105.18-.165.3-.15l3.43.43c.112.014.208.093.24.2l1.07 3.548z"/>
        </svg>
      </div>
      <h2 class="fw-bold text-dark mb-1">Clinical Parameter Form</h2>
    </div>
    <div class="card border-0 shadow-sm rounded-3 p-4 p-md-5 bg-white mb-4">
      <form method="post" novalidate>
        {% csrf_token %}

        <div class="row g-4">
          {% for field in form %}
          <div class="col-md-6">
            <label class="form-label small fw-bold text-dark tracking-wide mb-1">
              {{ field.label }}
            </label>
            <div class="input-group">
              {{ field }}
            </div>
            {% if field.errors %}
              <div class="text-danger font-monospace small mt-1" style="font-size: 0.8rem;">
                 {{ field.errors|join:", " }}
              </div>
            {% endif %}
          </div>
          {% endfor %}
        </div>

        <div class="mt-5 border-top pt-4">
          <button type="submit" class="btn btn-lg w-100 text-white fw-bold py-3 text-uppercase tracking-wider shadow-sm border-0"
                  style="background: linear-gradient(135deg, #600000 0%, #8b0000 100%); transition: transform 0.2s;"
                  onmouseover="this.style.transform='translateY(-1px)'"
                  onmouseout="this.style.transform='translateY(0)'">
               Compute  
          </button>
        </div>
      </form>
    </div>

     
  </div>
</div>
{% endblock %}
